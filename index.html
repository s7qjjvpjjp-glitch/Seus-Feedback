<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Pacientes - Pendências</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-box button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search-box button:hover {
            background: #5568d3;
        }

        .search-box button:active {
            transform: scale(0.98);
        }

        .info-text {
            color: #666;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .results-container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            min-height: 200px;
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .no-results-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .patient-card {
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .patient-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .patient-card.expanded {
            background: #f8f9ff;
            border-color: #667eea;
        }

        .patient-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .patient-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
            flex: 1;
        }

        .patient-age {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin: 0 15px;
        }

        .expand-icon {
            font-size: 1.5em;
            color: #667eea;
            transition: transform 0.3s;
        }

        .patient-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .patient-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-weight: 600;
            color: #667eea;
            font-size: 0.9em;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .info-value {
            color: #333;
            font-size: 1em;
        }

        .listas {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .lista-badge {
            background: #e8eaf6;
            color: #667eea;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .pendencias-list {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .pendencias-title {
            font-weight: 600;
            color: #d32f2f;
            margin-bottom: 10px;
            font-size: 0.95em;
            text-transform: uppercase;
        }

        .pendencia-item {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            color: #333;
        }

        .pendencia-item:last-child {
            margin-bottom: 0;
        }

        .hidden-content {
            display: none;
        }

        .patient-card.expanded .hidden-content {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .search-results-count {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 20px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .patient-info {
                grid-template-columns: 1fr;
            }

            .search-box {
                flex-direction: column;
            }

            .patient-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .patient-age {
                margin: 10px 0 0 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Busca de Pacientes</h1>
            <p>Encontre rapidamente as pendências de cada paciente</p>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Digite o nome do paciente..." 
                    autocomplete="off"
                >
                <button onclick="searchPatient()">Buscar</button>
            </div>
            <div class="info-text">
                💡 Dica: Digite parte do nome para resultados mais rápidos
            </div>
        </div>

        <div class="results-container">
            <div id="statsContainer" class="stats" style="display: none;"></div>
            <div id="searchResultsCount" class="search-results-count"></div>
            <div id="resultsDiv"></div>
        </div>
    </div>

    <script>
        // Dados dos pacientes - será preenchido dinamicamente
        let patientsData = [];

        // Função para calcular idade
        function calculateAge(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate.split('/').reverse().join('-'));
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                age--;
            }
            return age;
        }

        // Função de busca
        function searchPatient() {
            const searchTerm = document.getElementById('searchInput').value.trim().toUpperCase();
            const resultsDiv = document.getElementById('resultsDiv');
            const statsContainer = document.getElementById('statsContainer');
            const searchResultsCount = document.getElementById('searchResultsCount');

            if (!searchTerm) {
                resultsDiv.innerHTML = '<div class="no-results"><div class="no-results-icon">🔍</div><p>Digite um nome para buscar</p></div>';
                statsContainer.style.display = 'none';
                searchResultsCount.innerHTML = '';
                return;
            }

            const results = patientsData.filter(patient => 
                patient.nome.includes(searchTerm)
            );

            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results"><div class="no-results-icon">😕</div><p>Nenhum paciente encontrado com esse nome</p></div>';
                statsContainer.style.display = 'none';
                searchResultsCount.innerHTML = '';
                return;
            }

            // Mostrar estatísticas
            const totalPendencias = results.reduce((sum, p) => sum + p.pendencias.length, 0);
            const uniqueListas = new Set();
            results.forEach(p => p.listas.forEach(l => uniqueListas.add(l)));

            statsContainer.innerHTML = `
                <div class="stat-box">
                    <div class="stat-number">${results.length}</div>
                    <div class="stat-label">Paciente(s) encontrado(s)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">${totalPendencias}</div>
                    <div class="stat-label">Total de pendências</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number">${uniqueListas.size}</div>
                    <div class="stat-label">Lista(s) envolvida(s)</div>
                </div>
            `;
            statsContainer.style.display = 'grid';

            searchResultsCount.innerHTML = `<strong>Resultados:</strong> ${results.length} paciente(s) encontrado(s)`;

            resultsDiv.innerHTML = results.map((patient, index) => {
                const age = calculateAge(patient.nascimento);
                const pendenciasHtml = patient.pendencias
                    .map(p => `<div class="pendencia-item">✓ ${p}</div>`)
                    .join('');
                
                const listasHtml = patient.listas
                    .map(l => `<span class="lista-badge">${l}</span>`)
                    .join('');

                return `
                    <div class="patient-card" onclick="toggleCard(this)">
                        <div class="patient-header">
                            <div class="patient-name">${patient.nome}</div>
                            <div class="patient-age">${age} anos</div>
                            <div class="expand-icon">▼</div>
                        </div>
                        <div class="hidden-content">
                            <div class="patient-info">
                                <div class="info-item">
                                    <div class="info-label">Data de Nascimento</div>
                                    <div class="info-value">${patient.nascimento}</div>
                                </div>
                                <div class="info-item">
                                    <div class="info-label">Listas</div>
                                    <div class="listas">${listasHtml}</div>
                                </div>
                            </div>
                            <div class="pendencias-list">
                                <div class="pendencias-title">⚠️ Pendências (${patient.pendencias.length})</div>
                                ${pendenciasHtml}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Função para expandir/recolher card
        function toggleCard(element) {
            element.classList.toggle('expanded');
        }

        // Permitir busca ao pressionar Enter
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchPatient();
            }
        });

        // Carregar dados dos pacientes
        async function loadPatientData() {
            try {
                // Tentar carregar do arquivo JSON
                const response = await fetch('patients_data.json');
                if (response.ok) {
                    const data = await response.json();
                    patientsData = data;
                    console.log('Dados carregados com sucesso:', patientsData.length, 'pacientes');
                } else {
                    console.log('Arquivo de dados não encontrado');
                }
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
            }
        }

        // Inicializar ao carregar a página
        window.addEventListener('load', loadPatientData);
    </script>
</body>
</html>
